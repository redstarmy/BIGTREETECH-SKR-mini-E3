name: Build firmware

on:
  workflow_dispatch:
  push:
    paths:
      - firmware/V2.0/Marlin-2.0.8.2.x-SKR-mini-E3-V2.0/Marlin/Configuration.h
      - firmware/V2.0/Marlin-2.0.8.2.x-SKR-mini-E3-V2.0/Marlin/Configuration_adv.h
      - .github/workflows/build-firmware.yml

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out firmware
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build firmware
        run: pio run
        working-directory: firmware/V2.0/Marlin-2.0.8.2.x-SKR-mini-E3-V2.0

      - name: Upload firmware.bin
        uses: actions/upload-artifact@v4
        with:
          name: firmware-bin
          path: firmware/V2.0/Marlin-2.0.8.2.x-SKR-mini-E3-V2.0/.pio/build/STM32F103RC_btt_maple/firmware.bin
          if-no-files-found: error
